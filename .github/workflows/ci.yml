name: CI

on:
  push:
    branches: [main]
  pull_request:
  # A quiet week is not evidence the runtime still exports the entry point
  # mullion calls. The weekly run makes the required WebView2 check below a
  # standing early-warning wire. Scheduled runs use the default branch's workflow.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Least-privilege GITHUB_TOKEN: this workflow only reads the repo - it builds,
# tests and scans, and writes nothing back (no PR comments, no releases). The
# default token grant is read/write; narrowing it to contents:read means a
# compromised step cannot push, comment or cut a release (issue #13).
permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    # The windows-latest runner ships the Evergreen WebView2 runtime (measured
    # via the doctor probe: v149.0.4022.98), so the two machine tests in
    # internal/webview2 must run, not skip. This turns their "no runtime" skip
    # into a failure, so a green windows job proves the export mullion calls was
    # actually checked rather than quietly stepped over. See docs/decisions/0010.
    env:
      MULLION_REQUIRE_WEBVIEW2: "1"
    steps:
      # Full history, not the default shallow clone: leak-scan below scans commit
      # messages (git log), which a fetch-depth=1 checkout truncates to the single
      # tip/merge commit. See issue #71.
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"

      - name: gofmt
        shell: bash
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      # The wider hygiene net (leak_test.go covers only the narrow, portable
      # subset). Scans tracked files and commit messages for anything that must
      # never be published.
      - name: leak-scan
        run: pwsh scripts/leak-scan.ps1

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # The Host runs timers on their own goroutines; the race detector is not
      # ceremony here.
      - run: go test -race ./...

      # Plain `go build ./...` never compiles a tagged file. Without these two
      # steps the diagnostic builds rot silently.
      - run: go build -tags mullion_dwm_caption_diag ./...
      - run: go test -tags mullion_dwm_caption_diag ./...
      - run: go build -tags mullion_caption_passthrough_diag ./...
      - run: go test -tags mullion_caption_passthrough_diag ./...

  portable:
    # The non-Windows stub exists so that `go get` and a cross-platform build
    # work. This job is what keeps it honest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.22"

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: cross-compile for Windows
        run: GOOS=windows GOARCH=amd64 go build ./...
      - name: cross-compile for darwin
        run: GOOS=darwin GOARCH=arm64 go build ./...
