name: CI

on:
  push:
    branches: [main]
  pull_request:
  # A quiet week is not evidence the runtime still exports the entry point
  # mullion calls. The weekly run turns the doctor probe below into a standing
  # early-warning wire. Scheduled runs use the default branch's workflow.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: gofmt
        shell: bash
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

      # The wider hygiene net (leak_test.go covers only the narrow, portable
      # subset). Scans tracked files and commit messages for anything that must
      # never be published.
      - name: leak-scan
        run: pwsh scripts/leak-scan.ps1

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      # The Host runs timers on their own goroutines; the race detector is not
      # ceremony here.
      - run: go test -race ./...

      # Measure the silent-skip gap: the two machine tests in internal/webview2
      # skip when no WebView2 runtime is installed, so a green suite does not by
      # itself prove the export mullion calls was checked. The shipped diagnostic
      # loads the client DLL and resolves that export exactly as the host does.
      # This step does not fail the job (continue-on-error): its conclusion and
      # output report whether THIS runner exposes a usable runtime, which is what
      # decides how the check gets enforced next.
      - name: "Probe: does this runner expose a usable WebView2 runtime? (non-fatal)"
        continue-on-error: true
        run: go run ./cmd/mullion doctor

      # Plain `go build ./...` never compiles a tagged file. Without these two
      # steps the diagnostic builds rot silently.
      - run: go build -tags mullion_dwm_caption_diag ./...
      - run: go test -tags mullion_dwm_caption_diag ./...
      - run: go build -tags mullion_caption_passthrough_diag ./...
      - run: go test -tags mullion_caption_passthrough_diag ./...

  portable:
    # The non-Windows stub exists so that `go get` and a cross-platform build
    # work. This job is what keeps it honest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: cross-compile for Windows
        run: GOOS=windows GOARCH=amd64 go build ./...
      - name: cross-compile for darwin
        run: GOOS=darwin GOARCH=arm64 go build ./...
