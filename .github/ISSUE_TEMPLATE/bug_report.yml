name: Bug report
description: Something is wrong with the window, the bridge, the assets or the build.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **You do not need to pick labels.** Priority, area and whether this is a
        regression are assigned during triage, from what you write below.

        The environment fields are not bureaucracy. On a scaled multi-monitor
        setup, the runtime version, the scaling factor and which monitor the
        window was on each change the answer to a frame or DPI report. Without
        them the issue cannot be investigated, only guessed at.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you saw, not what you think caused it.
      placeholder: |
        The top 4 pixels of the title bar do not drag. Everything below them does.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: In the order you performed them. Include the gesture, not only the result.
      placeholder: |
        1. Launch the app on the 150% monitor.
        2. Press the mouse down 2px below the top edge of the title bar.
        3. Drag sideways. The window does not follow.
    validations:
      required: true

  - type: checkboxes
    id: silent
    attributes:
      label: Did it fail silently?
      options:
        - label: >-
            Every call reported success (no error, no warning, no log line) and
            nothing happened.
          required: false
    # A defect that reports success while doing nothing is treated as a blocker,
    # however small the fix looks. It is the failure mode this library is built
    # against, so this box materially changes the priority.

  - type: dropdown
    id: example
    attributes:
      label: Does it reproduce in examples/basic, unmodified?
      description: >-
        This separates "the library is wrong" from "the frontend and the Config
        disagree". If the CSS title bar height does not match Config.TitlebarHeight,
        a dead strip in the title bar is the expected result, not a bug.
      options:
        - "Yes"
        - "No, only in my own application"
        - "I have not tried"
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Did this work in an earlier version?
      description: If it did, say which one. Finding the commit that broke it comes before reasoning about the code.
      options:
        - "I do not know / first time using it"
        - "No, it never worked"
        - "Yes, it worked before"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: >-
        Run this and paste the whole block. It collects the Windows build, the GPUs,
        every monitor with its real resolution and scaling, the WebView2 Runtime
        version and the Go toolchain. Nothing is sent anywhere - it prints to your
        console and you decide what to paste.


        `pwsh scripts/diagnostics.ps1`


        Do not retype this from memory. The script measures the monitors with
        per-monitor DPI awareness; Windows reports a virtualised resolution to a
        process that does not, so a hand-written "1536x864" is the number a DPI bug
        report must not contain, and it sends the reader hunting a bug that is not
        there.


        No checkout of mullion? Then paste the environment you can gather by hand,
        and make sure the log below includes the `mullion: version=` line - the
        library reads its own version out of the binary at startup, which is more
        reliable than anything you can look up.
      render: text
      placeholder: |
        Windows:   Windows 11 Pro 24H2 (build 26100.0)
        Arch:      AMD64
        WebView2:  131.0.2903.99
        Go:        go version go1.22.5 windows/amd64
        mullion:   v0.1.0

        GPU:       Example Graphics Adapter (driver 1.2.3.4)

        Monitors:  2
          [1] 1920x1080 at 100% (dpi 96), origin 0,0, work area 1920x1032, primary
          [2] 2560x1440 at 150% (dpi 144), origin 1920,0, work area 2560x1392
    validations:
      required: true

  - type: input
    id: monitor
    attributes:
      label: Which monitor was the window on?
      description: >-
        Use the index from the block above. Say whether the window had been dragged
        there from another monitor - a bug that only appears after a crossing is a
        different bug from one that is there on launch.
      placeholder: "[2], after dragging it there from [1]"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: >-
        Attach a Logger and paste what it produced. For a hit-test, drag or resize
        problem set MULLION_HITTEST_DIAG=1; for a caption or tooltip problem set
        MULLION_TOOLTIP_TRACE=1. Paths in these messages are already reduced to
        file names, so a log does not leak your directories.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: A screen recording is worth more than a paragraph for a drag, snap or flicker problem.
    validations:
      required: false

  - type: checkboxes
    id: homework
    attributes:
      label: Before you file
      options:
        - label: I searched the existing issues.
          required: true
        - label: >-
            If this is a frame, hit-test, DPI or snap problem, I skimmed
            docs/lessons-and-dead-ends.md - several obvious explanations in this
            problem space have already been tried and ruled out.
          required: true
